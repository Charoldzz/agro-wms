<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f6f45" />
    <link rel="icon" type="image/png" href="/images/todo-logo.png" />
    <title>Todo Agricola</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Always reset iOS Safari zoom when any input loses focus
      document.addEventListener('focusout', function () {
        var meta = document.querySelector('meta[name=viewport]')
        if (meta) {
          var original = meta.content
          meta.content = 'width=device-width, initial-scale=1, maximum-scale=1'
          requestAnimationFrame(function () { meta.content = original })
        }
      })
      // Track visual viewport height (shrinks when keyboard opens)
      function updateVVH() {
        var h = window.visualViewport ? window.visualViewport.height : window.innerHeight
        document.documentElement.style.setProperty('--vvh', h + 'px')
      }
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateVVH)
      }
      updateVVH()
    </script>
  </body>
</html>
