<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f6f45" />
    <link rel="icon" type="image/png" href="/images/todo-logo.png" />
    <title>Todo Agricola</title>
  </head>
  <body>
    <script>
      ;(() => {
        const ROOT_SELECTORS = ['html', 'body', '#root', '.app-bg']
        const BACKDROP_SELECTORS = [
          '[data-temporary-overlay="true"]',
          '[data-operator-overlay="true"]',
          '[class*="fixed"][class*="inset-0"]',
        ]
        const PANEL_SELECTORS = '[data-overlay-panel="true"], [role="dialog"], .shadow-xl, .rounded-xl.bg-white'

        function isVisible(element) {
          const style = window.getComputedStyle(element)
          return style.display !== 'none' && style.visibility !== 'hidden' && Number(style.opacity) !== 0
        }

        function coversScreen(element) {
          if (!element || element === document.body || element === document.documentElement) return false
          if (!isVisible(element)) return false
          const rect = element.getBoundingClientRect()
          return rect.width >= window.innerWidth * 0.8 && rect.height >= window.innerHeight * 0.8
        }

        function hasPanel(element) {
          return Array.from(element.querySelectorAll(PANEL_SELECTORS)).some((panel) => {
            if (!isVisible(panel)) return false
            const rect = panel.getBoundingClientRect()
            return rect.width > 120 && rect.height > 80 && rect.bottom > 0 && rect.right > 0
          })
        }

        function resetRootStyles() {
          ROOT_SELECTORS.forEach((selector) => {
            const element = document.querySelector(selector)
            if (!element) return
            element.style.pointerEvents = 'auto'
            element.style.opacity = '1'
            element.style.filter = 'none'
          })
          document.documentElement.style.overflow = ''
          document.body.style.overflow = ''
          document.body.classList.remove('todo-hard-unlocked')
          document.getElementById('todo-rescue-unlock')?.remove()
        }

        function describeTopElement() {
          const x = Math.floor(window.innerWidth / 2)
          const y = Math.floor(window.innerHeight / 2)
          const element = document.elementFromPoint(x, y)
          if (!element) return null
          const style = window.getComputedStyle(element)
          return {
            tag: element.tagName,
            id: element.id || '',
            className: String(element.className || '').slice(0, 240),
            position: style.position,
            zIndex: style.zIndex,
            opacity: style.opacity,
            pointerEvents: style.pointerEvents,
            background: style.backgroundColor,
          }
        }

        function removeStaleBackdrops() {
          const removed = []
          document.querySelectorAll(BACKDROP_SELECTORS.join(',')).forEach((element) => {
            if (!coversScreen(element)) return
            if (hasPanel(element)) return
            removed.push({
              tag: element.tagName,
              id: element.id || '',
              className: String(element.className || '').slice(0, 240),
            })
            element.remove()
          })
          return removed
        }

        function unlock(reason = 'watchdog') {
          resetRootStyles()
          const removed = removeStaleBackdrops()
          window.__todoOverlayDebug = {
            at: new Date().toISOString(),
            reason,
            removed,
            top: describeTopElement(),
            body: {
              className: document.body.className,
              style: document.body.getAttribute('style') || '',
            },
            html: {
              className: document.documentElement.className,
              style: document.documentElement.getAttribute('style') || '',
            },
          }
          window.dispatchEvent(new Event('todo-force-unlock-app'))
        }

        window.__todoUnlockApp = unlock
        window.__todoOverlayDebug = { at: new Date().toISOString(), status: 'watching' }
        document.addEventListener('keydown', (event) => {
          if (event.ctrlKey && event.altKey && event.key.toLowerCase() === 'u') unlock('keyboard')
        })
        window.addEventListener('DOMContentLoaded', () => unlock('dom-ready'))
        window.addEventListener('pageshow', () => unlock('pageshow'))
        window.addEventListener('focus', () => unlock('focus'))
        window.addEventListener('hashchange', () => unlock('hashchange'))
        window.addEventListener('popstate', () => unlock('popstate'))
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') unlock('visible')
        })
        window.setInterval(() => unlock('interval'), 1200)
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
